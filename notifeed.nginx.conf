# Đặt file này vào /etc/nginx/sites-available/notifeed
# rồi: sudo ln -s /etc/nginx/sites-available/notifeed /etc/nginx/sites-enabled/
#
# Yêu cầu SSL đã được cấu hình (certbot hoặc thủ công).
# Nếu chưa có SSL, chạy: sudo certbot --nginx -d domain.com

server {
    listen 443 ssl;
    server_name domain.com;

    ssl_certificate     /etc/letsencrypt/live/domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Redirect /notifeed → /notifeed/ để tránh broken assets
    location = /notifeed {
        return 301 /notifeed/;
    }

    location /notifeed/ {
        proxy_pass http://127.0.0.1:8080/;  # trailing slash strips prefix
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: tắt buffering để events đến client ngay lập tức
        proxy_set_header  Connection '';
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding on;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name domain.com;
    return 301 https://$host$request_uri;
}
